<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Deal Room — Evaluation Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#F7F6F2;
    --surface:#FFFFFF;
    --ink:#171A1C;
    --muted:#6B6F76;
    --line:#E4E1D6;
    --accent:#0F6B4F;
    --accent-dark:#0B5B42;
    --accent-soft:#E3EFE9;
    --gold:#B9862F;
    --gold-soft:#F5EBD8;
    --danger:#B3432E;
    --danger-soft:#F6E6E1;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}
  ::selection{background:var(--accent-soft);}

  /* ---------- shell ---------- */
  #app{min-height:100vh;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;border-bottom:1px solid var(--line);background:var(--surface);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:26px;height:26px;border-radius:6px;background:var(--accent);position:relative;flex-shrink:0;}
  .brand-mark::after{content:"";position:absolute;inset:6px;border-radius:3px;background:var(--gold);}
  .brand-name{font-weight:600;font-size:15px;letter-spacing:0.2px;}
  .brand-tag{font-size:11px;color:var(--muted);margin-top:-2px;}
  .who{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);}
  .who b{color:var(--ink);}
  .logout{border:1px solid var(--line);background:transparent;padding:6px 12px;border-radius:8px;font-size:12.5px;color:var(--muted);}
  .logout:hover{border-color:var(--danger);color:var(--danger);}

  .center-screen{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:36px;max-width:420px;width:100%;box-shadow:0 1px 2px rgba(20,20,10,0.04);}
  .card h2{margin:0 0 6px;font-size:22px;}
  .card p.sub{color:var(--muted);font-size:13.5px;margin:0 0 24px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
  .field input, .field select, .field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#FCFCFA;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-primary:disabled{background:#B9C4BE;cursor:not-allowed;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--ink);}
  .btn-block{width:100%;}
  .role-pick{display:flex;flex-direction:column;gap:12px;}
  .role-btn{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:left;}
  .role-btn:hover{border-color:var(--accent);background:var(--accent-soft);}
  .role-icon{width:38px;height:38px;border-radius:9px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0;}
  .role-btn:hover .role-icon{background:var(--accent);color:#fff;}
  .role-title{font-weight:600;font-size:14.5px;}
  .role-desc{font-size:12.5px;color:var(--muted);}
  .error-msg{color:var(--danger);font-size:12.5px;margin-top:8px;}
  .back-link{background:none;border:none;color:var(--muted);font-size:12.5px;margin-bottom:18px;padding:0;text-decoration:underline;}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:4px;padding:0 28px;border-bottom:1px solid var(--line);background:var(--surface);}
  .tab{padding:12px 16px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .content{padding:24px 28px;max-width:1200px;margin:0 auto;}

  /* ---------- generic ---------- */
  .row{display:flex;align-items:center;gap:10px;}
  .row-between{display:flex;align-items:center;justify-content:space-between;}
  .section-title{font-size:18px;margin:0 0 4px;}
  .section-sub{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:600;}
  .pill-pending{background:var(--gold-soft);color:var(--gold);}
  .pill-done{background:var(--accent-soft);color:var(--accent);}
  .empty{border:1px dashed var(--line);border-radius:12px;padding:36px;text-align:center;color:var(--muted);font-size:13.5px;}

  /* ---------- upload ---------- */
  .dropzone{border:1.5px dashed var(--line);border-radius:12px;padding:32px;text-align:center;background:#FCFCFA;}
  .dropzone.drag{border-color:var(--accent);background:var(--accent-soft);}
  .dropzone input[type=file]{display:none;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:0.3px;padding:8px 10px;border-bottom:1px solid var(--line);}
  td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:hover td{background:#FAFAF7;}
  .table-wrap{border:1px solid var(--line);border-radius:12px;overflow-x:auto;background:#fff;-webkit-overflow-scrolling:touch;}
  .icon-btn{border:none;background:none;color:var(--muted);padding:4px 6px;border-radius:6px;font-size:12px;}
  .icon-btn:hover{color:var(--danger);background:var(--danger-soft);}
  .startup-list{display:flex;flex-direction:column;gap:10px;}
  .startup-card{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .15s;}
  .startup-card:hover{border-color:var(--accent);}
  .su-name{font-weight:600;font-size:14.5px;}
  .su-meta{font-size:12px;color:var(--muted);margin-top:2px;}

  /* score gauge */
  .gauge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace;flex-shrink:0;border:3px solid var(--line);}

  /* ---------- evaluator detail split ---------- */
  .detail-shell{display:grid;grid-template-columns:380px 1fr;gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;min-height:70vh;}
  .panel-left{border-right:1px solid var(--line);padding:24px;background:#FCFCFA;}
  .panel-right{padding:28px 32px;overflow-y:auto;max-height:80vh;}
  .crit-row{margin-bottom:20px;}
  .crit-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .crit-label{font-size:13px;font-weight:600;}
  .crit-value{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:14px;}
  input[type=range]{width:100%;accent-color:var(--accent);}
  .save-bar{position:sticky;bottom:0;background:#FCFCFA;padding-top:16px;margin-top:8px;border-top:1px solid var(--line);}
  .info-block{margin-bottom:22px;}
  .info-block h4{font-size:11.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin:0 0 8px;font-weight:700;}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 12px;font-size:13.5px;}
  .kv div:nth-child(odd){color:var(--muted);}
  .rubric-total-bar{position:sticky;top:0;background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;z-index:5;}
  .rubric-total-bar .label{font-size:12px;color:var(--accent-dark);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;}
  .rubric-total-bar .value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--accent-dark);}
  .rubric-category{margin-bottom:24px;padding-bottom:4px;}
  .rubric-cat-head{display:flex;justify-content:space-between;align-items:baseline;font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .rubric-cat-head .mono{color:var(--muted);font-size:12px;}
  .anchor-group{display:flex;flex-direction:column;gap:6px;}
  .anchor-btn{display:flex;align-items:flex-start;gap:10px;text-align:left;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:12.5px;line-height:1.4;color:var(--ink);}
  .anchor-btn:hover{border-color:var(--accent);background:var(--accent-soft);}
  .anchor-btn.selected{border-color:var(--accent);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent);}
  .anchor-points{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);flex-shrink:0;min-width:18px;}
  .anchor-label{color:var(--muted);}
  .anchor-btn.selected .anchor-label{color:var(--ink);}
  .gonogo-row{display:flex;gap:10px;margin:20px 0;}
  .gonogo-btn{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:13.5px;text-align:center;}
  .gonogo-btn.go.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
  .gonogo-btn.nogo.selected{background:var(--danger);border-color:var(--danger);color:#fff;}
  .type-warning{background:var(--danger-soft);border:1px solid var(--danger);color:var(--danger);border-radius:10px;padding:14px 16px;font-size:13px;}
  .memo-text{font-size:14px;line-height:1.65;white-space:pre-wrap;}
  .back-row{margin-bottom:18px;}

  /* results */
  .agg-row{cursor:pointer;}
  .expand-panel{background:#FAFAF7;padding:16px 20px;border-bottom:1px solid var(--line);}
  .eval-score-card{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13px;}
  .eval-score-card:last-child{border-bottom:none;}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;}

  .assign-grid{display:grid;grid-template-columns:1fr;gap:8px;max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff;}
  .assign-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;font-size:13px;}
  .assign-item:hover{background:var(--accent-soft);}
  .assign-item input{width:auto;}

  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:100;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}

  @media (max-width:900px){
    .detail-shell{grid-template-columns:1fr;}
    .panel-left{border-right:none;border-bottom:1px solid var(--line);}
    .panel-right{max-height:none;overflow-y:visible;}
    .rubric-total-bar{position:static;}
  }

  @media (max-width:640px){
    .topbar{padding:12px 16px;}
    .brand-tag{display:none;}
    .who{font-size:12px;gap:8px;}
    .content{padding:16px;}
    .tabs{padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .tab{padding:10px 12px;font-size:12.5px;white-space:nowrap;}
    .card{padding:24px 20px;}
    .center-screen{padding:16px;}
    .row-between{flex-wrap:wrap;gap:10px;}
    .startup-card{flex-wrap:wrap;gap:10px;}
    .kv{grid-template-columns:1fr;gap:2px 0;}
    .kv div:nth-child(odd){margin-top:8px;font-size:11.5px;text-transform:uppercase;letter-spacing:0.3px;}
    .kv div:first-child{margin-top:0;}
    th, td{padding:8px;font-size:12px;}
    .anchor-btn{padding:10px 12px;}
    .toast{left:12px;right:12px;bottom:16px;max-width:none;text-align:center;}
    .section-title{font-size:16.5px;}
    .assign-grid{max-height:260px;}
    .field input, .field select, .field textarea{font-size:16px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
/* ============ FIREBASE / FIRESTORE SETUP ============ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBiWemdOcEBXjNRO0IyRCNjuCq0Tx_X0Ac",
  authDomain: "ost2026-5b876.firebaseapp.com",
  projectId: "ost2026-5b876",
  storageBucket: "ost2026-5b876.firebasestorage.app",
  messagingSenderId: "57167677056",
  appId: "1:57167677056:web:47dc4393ac33b3e6c60865"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const COLLECTION = 'dealroom';

/* ============ STORAGE HELPERS (backed by Firestore) ============ */
const K = {
  startups: 'startups',
  evaluators: 'evaluators',
  scores: 'scores',
  criteria: 'criteria',
  adminCode: 'admin_code'
};

async function sget(key, fallback){
  try{
    const snap = await getDoc(doc(db, COLLECTION, key));
    if(!snap.exists()) return fallback;
    const data = snap.data();
    return data && data.json ? JSON.parse(data.json) : fallback;
  }catch(e){ console.error('storage get failed', key, e); return fallback; }
}
async function sset(key, value){
  try{
    await setDoc(doc(db, COLLECTION, key), { json: JSON.stringify(value) });
    return true;
  }catch(e){ console.error('storage set failed', key, e); return false; }
}

/* ============ SCORING RUBRICS ============ */
// Categories shared by both Deeptech and Tech-enabled at the Pre-Seed stage.
const SHARED_CATEGORIES_PRESEED = [
  {
    id:'team', label:'1. Team Strength & Inclusion', maxPoints:25,
    subcriteria:[
      {key:'founder_commitment', label:'Full-time founder commitment', maxPoints:5, anchors:[
        {points:5, label:'All co-founders are full-time'},
        {points:3, label:'Only the lead founder is full-time'},
        {points:1, label:'All founders are part-time'},
        {points:0, label:'No full-time founder commitment'}
      ]},
      {key:'team_size', label:'Team size & capacity', maxPoints:4, anchors:[
        {points:4, label:'Team of 5 or more people'},
        {points:3, label:'Team of 3-4'},
        {points:2, label:'Team of 2'},
        {points:1, label:'Solo founder'},
        {points:0, label:'No operational team'}
      ]},
      {key:'female_team', label:'Female team members', maxPoints:2, anchors:[
        {points:2, label:'\u226530% of the team are women'},
        {points:1, label:'At least 1 woman on the team'},
        {points:0, label:'No female team members'}
      ]},
      {key:'women_leadership', label:'Women in leadership roles', maxPoints:2, anchors:[
        {points:2, label:'At least one woman in a founder or executive role (CXO)'},
        {points:1, label:'Women present but not in leadership'},
        {points:0, label:'No women in leadership'}
      ]},
      {key:'youth', label:'Youth representation (<35)', maxPoints:2, anchors:[
        {points:2, label:'\u226550% of the team is under 35 years old'},
        {points:1, label:'Some team members under 35, but <50%'},
        {points:0, label:'No team members under 35'}
      ]},
      {key:'team_complementarity', label:'Team complementarity (via NLP)', maxPoints:5, anchors:[
        {points:5, label:'Clear, well-balanced roles with complementary skills (e.g. tech, business, operations)'},
        {points:4, label:'Mostly complementary roles, minor overlaps or gaps'},
        {points:3, label:'Some differentiation, but roles are unclear or overlapping'},
        {points:2, label:'Minimal complementarity or unclear responsibilities'},
        {points:1, label:'All founders have similar profiles or unclear functions'},
        {points:0, label:'No information provided or roles completely unclear'}
      ]},
      {key:'team_credentials', label:'Team credentials', maxPoints:5, anchors:[
        {points:5, label:'Strong, relevant experience in the sector; proven track record'},
        {points:4, label:'Relevant experience, but limited in years or sector depth'},
        {points:3, label:'Somewhat relevant background, transferable skills'},
        {points:2, label:'Limited experience or unrelated background'},
        {points:1, label:'Minimal experience; weak fit for the challenge'},
        {points:0, label:'No relevant credentials or unclear background'}
      ]}
    ]
  },
  {
    id:'solution', label:'3. Solution Clarity & Impact', maxPoints:25,
    subcriteria:[
      {key:'problem_definition', label:'Problem definition (via NLP)', maxPoints:6, anchors:[
        {points:6, label:'Problem is specific, urgent, and well-evidenced, with clear impact'},
        {points:5, label:'Problem is clear and relevant but lacks urgency or context'},
        {points:3, label:'Problem is understood but somewhat generic or missing real-world grounding'},
        {points:2, label:'Problem is vague or overly broad'},
        {points:1, label:'Problem is unclear or not articulated'},
        {points:0, label:'No problem defined'}
      ]},
      {key:'uvp', label:'Unique Value Proposition (via NLP)', maxPoints:6, anchors:[
        {points:6, label:'Clear, compelling, and specific UVP; strong reason why customers would choose this over others'},
        {points:5, label:'UVP is clear and relevant, but less differentiated or lacks proof'},
        {points:3, label:'UVP is present but somewhat generic or unclear'},
        {points:2, label:'UVP is weak or does not clearly address customer pain points'},
        {points:1, label:'UVP is vague or not meaningfully different from competitors'},
        {points:0, label:'No UVP articulated'}
      ]},
      {key:'impact', label:'Social/environmental impact', maxPoints:4, anchors:[
        {points:4, label:'Clearly aligned with 2 or more SDGs or significant, measurable impact'},
        {points:2, label:'Aligned with at least 1 SDG or general mention of impact'},
        {points:0, label:'No clear impact or not mentioned'}
      ]},
      {key:'scalability', label:'Solution scalability (via NLP)', maxPoints:4, anchors:[
        {points:4, label:'High scalability with evidence of market adaptability or replication'},
        {points:3, label:'Scalable with early signs or logical path to broader markets'},
        {points:1, label:'Limited scalability; heavily localized or customized'},
        {points:0, label:'No scalable path identified'}
      ]},
      {key:'competitive_positioning', label:'Competitive positioning (via NLP)', maxPoints:5, anchors:[
        {points:5, label:'Clear understanding of direct competitors, with specific, compelling differentiation for each'},
        {points:4, label:'Competitors identified and some differentiation, though not fully convincing'},
        {points:3, label:'General awareness of competitors, but differentiation is vague or weak'},
        {points:1, label:'Competitors mentioned, but no clear differentiation'},
        {points:0, label:'No competitors identified or completely missing rationale'}
      ]}
    ]
  },
  {
    id:'fundraising', label:'4. Fundraising & Financial Readiness', maxPoints:15,
    subcriteria:[
      {key:'amount_raised', label:'Amount raised to date', maxPoints:4, anchors:[
        {points:4, label:'Has raised >$25K from credible external sources (angels, grants, accelerators)'},
        {points:3, label:'Raised $10K-25K from external sources'},
        {points:2, label:'Raised <$10K externally, or mostly from informal sources'},
        {points:1, label:'Only founder, family & friends funding'},
        {points:0, label:'No funding raised'}
      ]},
      {key:'funding_diversity', label:'Funding source diversity', maxPoints:3, anchors:[
        {points:3, label:'Multiple types of capital raised'},
        {points:2, label:'One main external source'},
        {points:1, label:'Mostly informal sources (family/friends) with minimal external capital'},
        {points:0, label:'No capital raised / only founder-funded'}
      ]},
      {key:'fundraising_ask', label:'Clarity on fundraising ask', maxPoints:5, anchors:[
        {points:5, label:'Clear ask with amount, funding type, use of funds, and stage of round'},
        {points:4, label:'Clear amount and stage, with partial use of funds specified'},
        {points:3, label:'Amount stated, but unclear stage or use'},
        {points:2, label:'Vague or inconsistent fundraising information'},
        {points:1, label:'Only mentions "raising" with no detail'},
        {points:0, label:'No fundraising information provided'}
      ]},
      {key:'fundraising_momentum', label:'Fundraising engagement / momentum', maxPoints:3, anchors:[
        {points:3, label:'Active investor conversations or informal commitments in progress'},
        {points:2, label:'Some outreach underway, but still early stage'},
        {points:1, label:'No current investor engagement, but fundraising intent stated'},
        {points:0, label:'Not currently fundraising / no activity mentioned'}
      ]}
    ]
  },
  {
    id:'market_fit', label:'5. Market Fit & Expansion Strategy', maxPoints:20,
    subcriteria:[
      {key:'gtm_strategy', label:'Go-to-market strategy (via NLP)', maxPoints:10, anchors:[
        {points:10, label:'Clear, phased GTM plan tailored to target segment(s); includes specific channels and milestones'},
        {points:8, label:'GTM plan exists and makes sense, but lacks some structure or detail'},
        {points:6, label:'General direction identified, but plan is vague or untested'},
        {points:3, label:'Basic or generic GTM strategy; lacks market understanding'},
        {points:0, label:'No GTM strategy presented'}
      ]},
      {key:'expansion_plan', label:'Planned expansion & home country linkage', maxPoints:10, anchors:[
        {points:10, label:'Strong link between home market advantage and a well-defined, realistic international expansion plan'},
        {points:8, label:'Clear expansion ambition with logical ties to the home market'},
        {points:6, label:'Expansion mentioned but loosely connected to current operations'},

function rubricMaxTotal(rubric){

// Best-effort auto-detect of Deeptech vs Tech-enabled from F6S text fields; admin can always override.
const DEEPTECH_HINTS = ['deep tech','deeptech','deep-tech','biotech','medtech','life science','hardware','robotics','materials science','nanotech','semiconductor','space tech','cleantech hardware','synthetic biology','quantum','photonics'];
function guessStartupType(row){
  const haystack = [row.sector, row.oneLiner, row.description, row.differentiators]
    .filter(Boolean).join(' ').toLowerCase();
  for(const hint of DEEPTECH_HINTS){
    if(haystack.includes(hint)) return 'deeptech';
  }
  return 'tech-enabled';
}

/* ============ CSV MAPPING ============ */
const FIELD_MAP = {
  name: ['company name','company','startup','startup name','name','item name'],
  website: ['website','url','company website','link','website 1'],
  sector: ['industry','sector','category','vertical','markets'],
  stage: ['stage','investment stage','funding stage','f6s listed round stage','status'],
  country: ['country','location','hq','hq location'],
  oneLiner: ['tagline','one liner','one-liner','pitch','short description','elevator pitch'],
  founders: ['founders','founder names','founder(s)','team'],
  email: ['email','contact email','founder email']
};

// Admin/meta columns from F6S that aren't useful to show an evaluator; silently dropped rather than
// dumped into "additional data" clutter.
const NOISE_COLUMNS = ['startup id','your score','avg score','assigned evaluators','completed by','start app','finalize app','last contact','source 1 name','source 1 type','interfaces','rounds','# individuals','pipeline','tags','google plus'];

function normalizeHeader(h){ return (h||'').toString().trim().toLowerCase(); }

// Some exports (e.g. F6S) prepend a title row before the real column headers.
// Scan the first several rows and pick the first one that looks like a real header
// row (most cells filled in), rather than assuming row 1 is always it.
function arrayGridToObjects(grid){
  if(!grid || !grid.length) return [];
  let headerIdx = 0;
  const scanLimit = Math.min(grid.length, 10);
  for(let i=0; i<scanLimit; i++){
    const row = grid[i] || [];
    const filled = row.filter(c => c !== undefined && c !== null && String(c).trim() !== '').length;
    if(filled >= Math.max(3, Math.ceil(row.length * 0.5))){
      headerIdx = i;
      break;
    }
  }
  const headerRow = grid[headerIdx] || [];
  const dataRows = grid.slice(headerIdx + 1);
  return dataRows
    .map(row => {
      const obj = {};
      headerRow.forEach((h, ci) => {
        const key = (h ?? '').toString().trim();
        if(key) obj[key] = row[ci] !== undefined ? row[ci] : '';
      });
      return obj;
    })
    .filter(obj => Object.values(obj).some(v => v !== '' && v !== undefined && v !== null));
}

function mapCsvRow(row){
  const lowerRow = {};
  Object.keys(row).forEach(k => lowerRow[normalizeHeader(k)] = row[k]);
  const out = { extra: {}, founderList: [], links: {} };
  const usedKeys = new Set();

  const pick = (key)=>{
    if(lowerRow[key] !== undefined && lowerRow[key] !== ''){
      usedKeys.add(key);
      return String(lowerRow[key]).trim();
    }
    return '';
  };

  for(const field in FIELD_MAP){
    let found = null;
    for(const candidate of FIELD_MAP[field]){
      if(lowerRow[candidate] !== undefined && lowerRow[candidate] !== ''){
        found = lowerRow[candidate];
        usedKeys.add(candidate);
        break;
      }
    }
    out[field] = found ? String(found).trim() : '';
  }

  // F6S splits founders into separate "Founder N Name" / "Founder N Role" columns; combine them
  // both into a display string (out.founders) and a structured list (out.founderList).
  for(let n=1; n<=5; n++){
    const nameKey = 'founder '+n+' name';
    const roleKey = 'founder '+n+' role';
    if(lowerRow[nameKey]){
      usedKeys.add(nameKey);
      const role = lowerRow[roleKey] ? String(lowerRow[roleKey]).trim() : '';
      if(lowerRow[roleKey]) usedKeys.add(roleKey);
      out.founderList.push({ name: String(lowerRow[nameKey]).trim(), role });
    }
  }
  if(!out.founders && out.founderList.length){
    out.founders = out.founderList.map(f => f.role ? f.name+' ('+f.role+')' : f.name).join(', ');
  }

  // Structured application sections (Company snapshot, Pitch, Traction, Fundraising, Links)
  out.founded = pick('founded');
  out.incorporated = pick('incorporated');
  out.university = pick('university');
  out.differentiators = pick('differentiators');
  out.description = pick('description');
  out.milestone = pick('milestone');
  out.revenueModel = pick('revenue model');
  out.totalFunding = pick('total funding');
  out.cashRunway = pick('cash runway');
  out.clients = pick('clients');
  out.revLast12Months = pick('rev last 12 months');
  out.revLastMonth = pick('rev last month');
  out.roundAmount = pick('f6s listed round amount');
  out.roundAmountCurrency = pick('f6s listed round amount currency');
  out.roundValuation = pick('f6s listed round valuation amount');
  out.roundValuationCurrency = pick('f6s listed round valuation currency');
  out.roundStatus = pick('f6s listed round status');
  out.roundType = pick('f6s listed round type');
  out.roundUpdated = pick('f6s listed round updated date');
  out.links.website2 = pick('angellist');
  out.links.linkedin = pick('linkedin');
  out.links.github = pick('github');
  out.links.twitter = pick('twitter');
  out.links.facebook = pick('facebook');
  out.files = pick('files');
  out.videos = pick('videos');
  out.decks = pick('decks');
  out.notes = pick('notes');

  // Fall back oneLiner to a trimmed description if no tagline/pitch was found
  if(!out.oneLiner && out.description){
    out.oneLiner = out.description.length > 160 ? out.description.slice(0,157)+'…' : out.description;
  }

  // Drop known admin/meta noise columns silently, keep everything else genuinely leftover as extra
  NOISE_COLUMNS.forEach(nc => { if(lowerRow[nc] !== undefined) usedKeys.add(nc); });
  Object.keys(row).forEach(origKey => {
    const norm = normalizeHeader(origKey);
    if(!usedKeys.has(norm) && row[origKey] !== undefined && row[origKey] !== ''){
      out.extra[origKey] = row[origKey];
    }
  });
  out.name = out.name || '(unnamed startup)';
  out.track = 'pre-seed';
  out.type = guessStartupType(out);
  return out;
}

async function attachAdminGate(){

    S.adminCodeExists = !!existing;

    const btn = document.getElementById('adminCodeSubmit');
    if(!val){ err.textContent='Please enter a code.'; err.style.display='block'; return; }

      btn.disabled = true; btn.textContent = 'Saving…';

      // Verify the save actually landed before trusting it (Firestore rules/network issues fail silently otherwise)
      const confirmRead = await sget(K.adminCode, null);
      if(!saved || confirmRead !== val){
        btn.disabled = false; btn.textContent = 'Create & continue';
        err.textContent = "Couldn't save the admin code, check your Firestore rules are published, then try again.";
        err.style.display = 'block';
        return;
      }
      S.adminCodeExists = true;
      S.adminAuthed = true;
      localStorage.setItem('dealroom_admin_authed', '1');
      toast('Admin code created');
      render();
    } else {
      const existing = await sget(K.adminCode, null);
      if(val === existing){
        S.adminAuthed = true;
        localStorage.setItem('dealroom_admin_authed', '1');
        render();
      }
      else { err.textContent='Incorrect code.'; err.style.display='block'; }
    }
  };
}

function attachAdminStartups(){
  const csvInput = document.getElementById('csvInput');
  if(csvInput){
    csvInput.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const lowerName = file.name.toLowerCase();
      const isExcel = lowerName.endsWith('.xlsx') || lowerName.endsWith('.xls');

      const finishRows = (rawRows)=>{
        const rows = rawRows.map(mapCsvRow).filter(r=>r.name && r.name !== '(unnamed startup)' || Object.keys(r.extra).length);
        if(rows.length === 0){ toast('No rows found in that file'); return; }
        S.csvPreview = rows;
        render();
      };

      if(isExcel){
        const reader = new FileReader();
        reader.onload = (evt)=>{
          try{
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type:'array' });
            const firstSheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[firstSheetName];
            const grid = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });
            finishRows(arrayGridToObjects(grid));
          }catch(err){ console.error(err); toast('Could not parse that Excel file'); }
        };
        reader.onerror = ()=>{ toast('Could not read that file'); };
        reader.readAsArrayBuffer(file);
      } else {
        Papa.parse(file, {
          header:false, skipEmptyLines:true,
          complete: (results)=>{ finishRows(arrayGridToObjects(results.data)); },
          error: ()=>{ toast('Could not parse that CSV'); }
        });
      }
    };
  }
  document.querySelectorAll('[data-i]').forEach(inp=>{
    const handler = ()=>{
      const i = +inp.dataset.i, f = inp.dataset.f;
      S.csvPreview[i][f] = inp.value;
    };
    inp.oninput = handler;
    inp.onchange = handler;
  });
  document.querySelectorAll('[data-set-type]').forEach(sel=>{
    sel.onchange = async ()=>{
      const startup = S.startups.find(s=>s.id===sel.dataset.setType);
      startup.type = sel.value;
      await sset(K.startups, S.startups);
      toast('Type updated');
    };
  });
  document.querySelectorAll('[data-remove]').forEach(b=>{
    b.onclick = ()=>{ S.csvPreview.splice(+b.dataset.remove,1); render(); };
  });
  const confirmBtn = document.getElementById('confirmSave');

/* ---- Admin: Results tab ---- */
function scoresForStartup(startupId){
  return Object.entries(S.scores)
    .filter(([k,v])=> k.split('::')[1] === startupId)
    .map(([k,v])=>({ evaluatorId:k.split('::')[0], ...v }));
}
function avgOf(nums){ if(!nums.length) return null; return (nums.reduce((a,b)=>a+b,0)/nums.length); }

function scoreRowTotal(row, rubric){
  if(!row.subScores) return null;
  const vals = rubric.flatMap(cat=>cat.subcriteria.map(sub=>row.subScores[sub.key])).filter(v=>typeof v==='number');
  if(!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0);
}
function categoryTotal(row, cat){
  const vals = cat.subcriteria.map(sub=>row.subScores ? row.subScores[sub.key] : undefined).filter(v=>typeof v==='number');
  if(!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0);
}

function renderAdminResults(){
  if(!S.startups.length) return `<div class="empty">No startups yet.</div>`;
  return `
  <div class="section-title">Results</div>
  <p class="section-sub">Averaged across all evaluators who've submitted a score. Click a row to see individual scores, Go/No-Go calls, and comments.</p>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Startup</th><th>Type</th><th>Scores in</th><th>Go / No-Go</th><th>Avg total</th></tr></thead>
      <tbody>
        ${S.startups.map(s=>{
          const rubric = getRubric(s);
          const rows = scoresForStartup(s.id);
          const maxTotal = rubric ? rubricMaxTotal(rubric) : null;
          const totals = rubric ? rows.map(r=>scoreRowTotal(r,rubric)).filter(v=>v!==null) : [];
          const avgTotal = avgOf(totals);
          const goCount = rows.filter(r=>r.goNoGo==='go').length;
          const noGoCount = rows.filter(r=>r.goNoGo==='no-go').length;
          return `
          <tr class="agg-row" data-expand="${s.id}">
            <td><b>${esc(s.name)}</b></td>
            <td>${s.type ? (s.type==='deeptech'?'Deeptech':'Tech-enabled') : '<span style="color:var(--danger);">Not set</span>'}</td>
            <td>${rows.length} / ${S.evaluators.filter(e=>e.assignedStartupIds.includes(s.id)).length || '—'}</td>
            <td>${goCount||noGoCount ? `<span class="chip" style="background:var(--accent-soft);color:var(--accent);">Go: ${goCount}</span> <span class="chip" style="background:var(--danger-soft);color:var(--danger);">No-Go: ${noGoCount}</span>` : '—'}</td>
            <td class="mono" style="font-weight:700;">${avgTotal===null?'—':avgTotal.toFixed(1)+' / '+maxTotal}</td>
          </tr>
          <tr id="expand-${s.id}" style="display:none;"><td colspan="5" style="padding:0;">
            <div class="expand-panel">
              ${!rubric ? '<div class="su-meta">Set this startup\'s Type in the Startups tab to enable scoring.</div>' : rows.length===0 ? '<div class="su-meta">No scores submitted yet.</div>' : `
              ${rubric.map(cat=>{
                const catVals = rows.map(r=>categoryTotal(r,cat)).filter(v=>v!==null);
                const catAvg = avgOf(catVals);
                return `<div class="su-meta" style="margin-bottom:6px;"><b>${esc(cat.label)}:</b> ${catAvg===null?'—':catAvg.toFixed(1)} / ${cat.maxPoints} avg</div>`;
              }).join('')}
              <div style="height:10px;"></div>
              ${rows.map(r=>{
                const evaluator = S.evaluators.find(e=>e.id===r.evaluatorId);
                const rowTotal = scoreRowTotal(r,rubric);
                return `
                <div class="eval-score-card">
                  <div style="min-width:120px;"><b>${esc(evaluator?evaluator.name:'Unknown')}</b><div class="su-meta">${rowTotal===null?'—':rowTotal+' / '+rubricMaxTotal(rubric)} &middot; ${r.goNoGo ? (r.goNoGo==='go'?'Go':'No-Go') : 'No call'}</div></div>
                  <div class="chip-row" style="flex:1;">
                    ${rubric.flatMap(cat=>cat.subcriteria).map(sub=>`<span class="chip">${esc(sub.label)}: ${r.subScores && r.subScores[sub.key]!==undefined ? r.subScores[sub.key] : '—'}</span>`).join('')}

                </div>`;
              }).join('')}`}
            </div>
          </td></tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ============ EVALUATOR SHELL ============ */
function gaugeColor(pct){
  if(pct===null) return {border:'var(--line)', text:'var(--muted)'};
  if(pct < 40) return {border:'var(--danger)', text:'var(--danger)'};
  if(pct < 70) return {border:'var(--gold)', text:'var(--gold)'};
  return {border:'var(--accent)', text:'var(--accent)'};
}

function renderEvaluatorShell(){
  const ev = S.evaluator;
  if(S.currentStartupId){
    return renderEvaluatorDetail();
  }
  const assigned = S.startups.filter(s=> ev.assignedStartupIds.includes(s.id));
  return `
  ${topbar(`Logged in as <b>${esc(ev.name)}</b><button class="logout" id="logoutBtn">Log out</button>`)}
  <div class="content">
    <div class="section-title">Your assigned startups</div>
    <p class="section-sub">${assigned.length} startups to review</p>
    ${assigned.length===0 ? `<div class="empty">No startups have been assigned to you yet. Check with the admin.</div>` : `
    <div class="startup-list">
      ${assigned.map(s=>{
        const own = S.scores[ev.id+'::'+s.id];
        const rubric = getRubric(s);
        const maxTotal = rubric ? rubricMaxTotal(rubric) : 100;
        let ownTotal = null;
        if(own && own.subScores){
          const vals = Object.values(own.subScores).filter(v=>typeof v === 'number');
          if(vals.length) ownTotal = vals.reduce((a,b)=>a+b,0);
        }
        const pct = ownTotal===null ? null : (ownTotal/maxTotal*100);
        const g = gaugeColor(pct);
        return `
        <div class="startup-card" data-open="${s.id}">
          <div class="row">
            <div class="gauge" style="border-color:${g.border};color:${g.text};">${ownTotal===null?'—':ownTotal}</div>
            <div>
              <div class="su-name">${esc(s.name)}</div>
              <div class="su-meta">${esc(s.sector||'')}${s.type?' &middot; '+(s.type==='deeptech'?'Deeptech':'Tech-enabled'):''}${s.country?' &middot; '+esc(s.country):''}</div>
            </div>
          </div>
          <span class="pill ${own?'pill-done':'pill-pending'}">${own?'Scored':'Pending'}</span>
        </div>`;
      }).join('')}
    </div>`}
  </div>
  <div class="toast" id="toast"></div>`;
}

        <div class="info-block">
          <h4>Investment memo</h4>
          <div class="memo-text">${s.memo ? esc(s.memo) : '<span style="color:var(--muted);font-style:italic;">No memo written yet.</span>'}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>`;
}

function computeRubricTotal(){
  let total = 0;
  document.querySelectorAll('.anchor-btn.selected').forEach(btn=>{ total += +btn.dataset.points; });
  const totalEl = document.getElementById('rubricTotal');
  if(totalEl){
    const max = totalEl.textContent.split('/')[1].trim();
    totalEl.textContent = total + ' / ' + max;
  }
}

function attachEvaluatorDetailListeners(){
  document.getElementById('logoutBtn').onclick = ()=>{ S.view='landing'; S.evaluator=null; S.currentStartupId=null; render(); };
  document.getElementById('backList').onclick = ()=>{ S.currentStartupId=null; render(); };

  document.querySelectorAll('.anchor-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const subkey = btn.dataset.sub;
      document.querySelectorAll(`.anchor-btn[data-sub="${subkey}"]`).forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      const subtotalEl = document.querySelector(`[data-subtotal-for="${subkey}"]`);
      if(subtotalEl){
        const max = subtotalEl.textContent.split('/')[1].trim();
        subtotalEl.textContent = btn.dataset.points + '/' + max;
      }
      computeRubricTotal();
    };
  });

  document.querySelectorAll('.gonogo-btn').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('.gonogo-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });

  const saveBtn = document.getElementById('saveScoreBtn');
  if(saveBtn){
    saveBtn.onclick = async ()=>{
      const ev = S.evaluator, s = S.startups.find(x=>x.id===S.currentStartupId);
      const key = ev.id+'::'+s.id;
      const subScores = {};
      document.querySelectorAll('.anchor-btn.selected').forEach(btn=>{ subScores[btn.dataset.sub] = +btn.dataset.points; });
      const goNoGoBtn = document.querySelector('.gonogo-btn.selected');
      const goNoGo = goNoGoBtn ? goNoGoBtn.dataset.gonogo : null;
      const comments = document.getElementById('commentsInput').value;
      S.scores[key] = { subScores, goNoGo, comments, updatedAt: Date.now() };
      await sset(K.scores, S.scores);
      toast('Score saved');
      render();
    };
  }
}

/* patch attachEvaluatorShell to also wire detail view */
const _origAttachEvaluatorShell = attachEvaluatorShell;
attachEvaluatorShell = function(){
  if(S.currentStartupId){ attachEvaluatorDetailListeners(); return; }
  _origAttachEvaluatorShell();
};

/* ============ UTIL ============ */
function esc(str){
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escAttr(str){ return esc(str); }
function asLink(value){
  if(!value) return '—';
  let href = String(value).trim();
  if(!/^https?:\/\//i.test(href)) href = 'https://' + href.replace(/^\/\//,'');
  return `<a href="${escAttr(href)}" target="_blank" rel="noopener">${esc(value)}</a>`;
}

/* ============ INIT ============ */
loadAll();
